name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vedio_summary_v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vedio_summary_v1/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run build
